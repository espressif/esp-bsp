title: Binary Sizes Payload
type: object
properties:
  time:
    type: string
    title: Time of the run
    description: Timestamp of when the benchmark was executed on the DUT.
  board:
    type: string
    title: Board name
    description: Name of the target board used for the benchmark.
  LVGL:
    type: string
    title: LVGL version
    description: Version of the LVGL library used.
  tests:
    type: array
    title: Benchmark test results
    description: List of all LVGL benchmark scenes with performance metrics.
    items:
      type: object
      properties:
        Name:
          type: string
          title: Test scene name
          description: Name of the LVGL benchmark scene.
        Avg. CPU:
          type: string
          title: Average CPU usage
          description: Average CPU utilization during the test.
          unit: percent
        Avg. FPS:
          type: string
          title: Average FPS
          description: Average frames per second.
          unit: fps
        Avg. time:
          type: string
          title: Average frame time
          description: Average time per frame.
          unit: ms
        render time:
          type: string
          title: Render time
          description: Average render time per frame.
          unit: ms
        flush time:
          type: string
          title: Flush time
          description: Average flush/transfer time per frame.
          unit: ms
      required:
        - Name
        - Avg. CPU
        - Avg. FPS
        - Avg. time
        - render time
        - flush time
      additionalProperties: false
  binary_size:
    type: object
    title: Binary size report
    description: Memory layout report from ESP-IDF size tool output.
    properties:
      version:
        type: string
        title: Report format version
        description: Version of the size report format.
      layout:
        type: array
        title: Memory regions
        description: List of memory regions with usage information.
        items:
          type: object
          properties:
            name:
              type: string
              title: Memory region name
              description: Name of the memory region (e.g. Flash Code, DRAM, IRAM).
            total:
              type: integer
              title: Total size
              description: Total available size of the memory region.
              unit: bytes
            used:
              type: integer
              title: Used size
              description: Used size within the memory region.
              unit: bytes
            free:
              type: integer
              title: Free size
              description: Remaining free size within the memory region.
              unit: bytes
            parts:
              type: object
              title: Section breakdown
              description: Mapping of linker section names to their sizes.
              patternProperties:
                ^\.[a-zA-Z0-9_]+$:
                  type: object
                  properties:
                    size:
                      type: integer
                      title: Section size
                      description: Size of this linker section.
                      unit: bytes
                  required:
                    - size
                  additionalProperties: false
              additionalProperties: false
          required:
            - name
            - total
            - used
            - free
            - parts
          additionalProperties: false
    required:
      - version
      - layout
    additionalProperties: false
required:
  - board
  - tests
  - binary_size
additionalProperties: false