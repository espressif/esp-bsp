
version: "4.0.0"
description: Board Support Package (BSP) for M5Stack Core S3
url: https://github.com/espressif/esp-bsp/tree/master/bsp/m5stack_core_s3

targets:
  - esp32s3

tags:
  - bsp
  - M5Stack

dependencies:
  idf: ">=5.4"
  
  esp_codec_dev:
    version: "~1.5"
    public: true
  
  espressif/esp_io_expander_aw9523:
    version: "*"
    public: true
    override_path: "../../components/io_expander/esp_io_expander_aw9523"
  
  espressif/esp_lvgl_port:
    version: "^2"
    public: true
    override_path: "../../components/esp_lvgl_port"
  
  espressif/esp_lcd_ili9341:
    version: "*"
    public: false
    override_path: "../../components/lcd/esp_lcd_ili9341"
  
  espressif/esp_lcd_touch_ft5x06:
    version: "*"
    public: false
    override_path: "../../components/lcd_touch/esp_lcd_touch_ft5x06"
  
  esp_video:
    version: "~2.0"
    public: true
  
  usb:
    version: "^1"
    public: true
  
  espressif/bmi270:
    version: "*"
    public: true
    override_path: "../../components/sensors/bmi270"

examples:
  - path: ../../examples/display
  - path: ../../examples/display_rotation
  - path: ../../examples/display_audio_photo
  - path: ../../examples/display_camera_video
  - path: ../../examples/display_lvgl_demos
  - path: ../../examples/display_lvgl_benchmark
