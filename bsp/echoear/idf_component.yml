
version: "1.0.0"
description: Board Support Package (BSP) for EchoEar
url: https://github.com/espressif/esp-bsp/tree/master/bsp/echoear

targets:
  - esp32s3

tags:
  - bsp

dependencies:
  idf: ">=5.5"
  
  esp_codec_dev:
    version: "~1.5"
    public:  true
  
  espressif/esp_lvgl_port:
    version: "^2"
    public:  true
    override_path: "../../components/esp_lvgl_port"
  
  espressif/esp_lcd_st77916:
    version: "*"
    public:  false
  
  espressif/esp_lcd_touch_cst816s:
    version: "*"
    public:  false
    override_path: "../../components/lcd_touch/esp_lcd_touch_cst816s"
  
  button:
    version: "^4"
    public:  true
  
  led_indicator:
    version: "^2"
    public:  true
  