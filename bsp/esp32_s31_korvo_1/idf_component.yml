
version: "1.0.0"
description: Board Support Package (BSP) for ESP32-S31-Korvo-1
url: https://github.com/espressif/esp-bsp/tree/master/bsp/esp32-s31-korvo-1

targets:
  - esp32s31

tags:
  - bsp

dependencies:
  idf: ">=5.4"

  esp_codec_dev:
    version: "~1.5"
    public: true

  espressif/esp_lvgl_port:
    version: "^2"
    public: true
    override_path: "../../components/esp_lvgl_port"

  espressif/esp_lcd_touch_gt1151:
    version: "*"
    public: false
    override_path: "../../components/lcd_touch/esp_lcd_touch_gt1151"

  esp_video:
    version: "~2.2"
    public: true

  button:
    version: "^4"
    public: true

  led_indicator:
    version: "^2"
    public: true

  usb:
    version: "^1"
    public: true
