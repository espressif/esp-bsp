version: "5.0.0"
description: Board Support Package (BSP) for ESP32-S3-Korvo-2
url: https://github.com/espressif/esp-bsp/tree/master/bsp/esp32_s3_korvo_2

targets:
  - esp32s3

tags:
  - bsp

dependencies:
  idf: ">=5.4"
  
  esp_codec_dev:
    version: "~1.5"
    public: true
  
  espressif/esp_io_expander_tca9554:
    version: "*"
    public: true
    override_path: "../../components/io_expander/esp_io_expander_tca9554"
  
  espressif/esp_lvgl_port:
    version: "^2"
    public: true
    override_path: "../../components/esp_lvgl_port"
  
  espressif/esp_lcd_ili9341:
    version: "*"
    public: false
    override_path: "../../components/lcd/esp_lcd_ili9341"

  espressif/esp_lcd_touch_gt911:
    version: "*"
    public: false
    override_path: "../../components/lcd_touch/esp_lcd_touch_gt911"
  
  espressif/esp_lcd_touch_tt21100:
    version: "*"
    public: false
    override_path: "../../components/lcd_touch/esp_lcd_touch_tt21100"
  
  esp_video:
    version: "~2.0"
    public: true
  
  button:
    version: "^4"
    public: true
  
  led_indicator:
    version: "^2"
    public: true
  
examples:
  - path: ../../examples/audio
  - path: ../../examples/display
  - path: ../../examples/display_rotation
  - path: ../../examples/display_audio_photo
  - path: ../../examples/display_camera_video
  - path: ../../examples/display_lvgl_demos
  - path: ../../examples/display_lvgl_benchmark
  - path: ../../examples/display_sdcard
